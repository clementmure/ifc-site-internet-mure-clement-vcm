<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Velo Club Montbrisonnais</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="Velo Club Montbrisonnais">
          <img
            src="assets/logo.png"
            alt="Logo Velo Club Montbrisonnais"
          />
        </a>
        <nav class="main-nav" aria-label="Navigation principale">
          <a href="index.html">Accueil</a>
          <a href="historique.html">L’histoire du club</a>
          <a href="actualites.html">Actualités</a>
        </nav>
        <a class="vcm-pill" href="contact.html">NOUS CONTACTER</a>
      </div>
    </header>

    <main class="page-main contact-page">
      <section class="contact-hero reveal">
        <div class="container">
          <h1>Nous contacter</h1>
          <p class="contact-subtitle">
            Contactez le club : envoyez-nous votre demande, nous vous
            répondrons rapidement.
          </p>
        </div>
      </section>

      <section class="reveal">
        <div class="container">
          <div class="contact-shell">
            <form class="contact-form" id="contact-form" novalidate>
              <div class="form-field">
                <label for="nom">Nom</label>
                <input id="nom" name="nom" type="text" required />
                <div class="field-error" aria-live="polite"></div>
              </div>

              <div class="form-field">
                <label for="prenom">Prénom</label>
                <input
                  id="prenom"
                  name="prenom"
                  type="text"
                  required
                />
                <div class="field-error" aria-live="polite"></div>
              </div>

              <div class="form-row-full form-field">
                <label for="email">Adresse e-mail</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  required
                />
                <div class="field-error" aria-live="polite"></div>
              </div>

              <div class="form-field">
                <label for="telephone">Téléphone</label>
                <input
                  id="telephone"
                  name="telephone"
                  type="tel"
                  autocomplete="tel"
                  required
                />
                <div class="field-error" aria-live="polite"></div>
              </div>

              <div class="form-field">
                <label for="sujet">Sujet</label>
                <input id="sujet" name="sujet" type="text" required />
                <div class="field-error" aria-live="polite"></div>
              </div>

              <div class="form-row-full form-field">
                <label for="message">Message</label>
                <textarea
                  id="message"
                  name="message"
                  required
                ></textarea>
                <div class="field-error" aria-live="polite"></div>
              </div>

              <div class="form-actions">
                <p class="form-global-error" id="form-global-error" aria-live="polite"></p>
                <button type="submit" class="submit-btn">
                  Envoyer
                </button>
              </div>

              <div
                id="contact-success"
                class="contact-success"
                role="status"
                aria-live="polite"
              >
                Message envoyé avec succès. Merci !
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer reveal">
      <div class="container footer-inner">
        <h2>Partenaires club</h2>
        <div class="sponsor-marquee" aria-label="Logos des partenaires">
          <div class="sponsor-track">
            <div class="sponsor-set">
              <div class="sponsor-item"><img src="assets/logo blanchet groupe sponsor.jpg" alt="Blanchet Groupe" /></div>
              <div class="sponsor-item"><img src="assets/logo carrefour market.png" alt="Carrefour Market" /></div>
              <div class="sponsor-item"><img src="assets/logo crédit mutuel.png" alt="Crédit Mutuel Montbrison" /></div>
              <div class="sponsor-item"><img src="assets/logo cycles sprint.png" alt="Cycles Sprint" /></div>
              <div class="sponsor-item"><img src="assets/logo gaillard stores et fermetures .png" alt="Gaillard Stores &amp; Fermetures" /></div>
              <div class="sponsor-item"><img src="assets/logo la mie caline.png" alt="La Mie Câline Montbrison" /></div>
              <div class="sponsor-item"><img src="assets/logo.vernin ingénierie.webp" alt="Vernin Ingénierie" /></div>
            </div>
            <div class="sponsor-set" aria-hidden="true">
              <div class="sponsor-item"><img src="assets/logo blanchet groupe sponsor.jpg" alt="" /></div>
              <div class="sponsor-item"><img src="assets/logo carrefour market.png" alt="" /></div>
              <div class="sponsor-item"><img src="assets/logo crédit mutuel.png" alt="" /></div>
              <div class="sponsor-item"><img src="assets/logo cycles sprint.png" alt="" /></div>
              <div class="sponsor-item"><img src="assets/logo gaillard stores et fermetures .png" alt="" /></div>
              <div class="sponsor-item"><img src="assets/logo la mie caline.png" alt="" /></div>
              <div class="sponsor-item"><img src="assets/logo.vernin ingénierie.webp" alt="" /></div>
            </div>
          </div>
        </div>
        <div class="social-links" aria-label="Réseaux sociaux">
          <a href="#" aria-label="Facebook">f</a>
          <a href="#" aria-label="Twitter">t</a>
          <a href="#" aria-label="LinkedIn">in</a>
          <a href="#" aria-label="Instagram">o</a>
        </div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
